services:

  # Tailscale sidecar
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-on-the-fly-nvs}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY is required. Get one at https://login.tailscale.com/admin/settings/keys}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--accept-routes
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "0.0.0.0:2222:22"
      - "0.0.0.0:6009:6009"
      - "0.0.0.0:8000:8000"
    restart: unless-stopped

  # on-the-fly NVS server
  on-the-fly-nvs:
    build: .
    image: on-the-fly-nvs:latest
    runtime: nvidia
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    environment:
      - CUDA_VISIBLE_DEVICES=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - STREAM_URL=${STREAM_URL:-}
      - MODEL_PATH=${MODEL_PATH:-/app/results}
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:-}
      - CCCL_IGNORE_DEPRECATED_CPP_DIALECT=1
      # HuggingFace mirror for faster model download in China
      - HF_ENDPOINT=https://hf-mirror.com
      # FFmpeg auto-reconnect for MJPEG HTTP stream (IP Camera Lite uses HTTP/1.0)
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=reconnect;1|reconnect_streamed;1|reconnect_delay_max;2|timeout;60000000
    volumes:
      - model_cache:/cache
      - cupy_cache:/root/.cupy
      - ./results:/app/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  model_cache:
  cupy_cache:
  tailscale_state:
